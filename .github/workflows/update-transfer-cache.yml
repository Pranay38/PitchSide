name: Update Transfer Cache

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper dependencies
        run: pip install -r scripts/requirements-transfers.txt

      - name: Refresh transfer cache
        run: python scripts/scrape_transfermarkt_transfers.py

      - name: Commit updated cache
        run: |
          if git diff --quiet -- public/data/transfers_scraped.json; then
            echo "No transfer cache changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/transfers_scraped.json
          git commit -m "chore: refresh transfer cache"
          git push
