name: Update Daily Features

on:
  schedule:
    - cron: "0 5 * * *" # Runs every day at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-daily-features:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-daily.txt

      - name: Generate Daily Features
        run: python scripts/generate_daily_features.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data/daily_features.json; then
            echo "No daily features changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/daily_features.json
          git commit -m "chore: refresh daily features data"
          git push
