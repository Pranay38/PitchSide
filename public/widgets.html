<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scores & Fixtures</title>
    <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: transparent;
            overflow-x: hidden;
        }

        .tabs {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            overflow-x: auto;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .tab-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f1f5f9;
            color: #64748b;
        }

        .tab-btn.active {
            background: #16A34A;
            color: #fff;
            box-shadow: 0 1px 3px rgba(22, 163, 74, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: #e2e8f0;
        }

        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 4px;
            padding: 8px 12px;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .mode-btn {
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #64748b;
        }

        .mode-btn.active {
            background: #fff;
            color: #0f172a;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .widget-section {
            display: block;
        }

        .widget-section.hidden {
            display: none;
        }

        #game-content api-sports-widget {
            max-height: calc(100vh - 100px);
        }

        #standings-content api-sports-widget {
            margin-bottom: 1rem;
            max-height: 55vh;
        }
    </style>
</head>

<body>
    <!-- Competition Tabs -->
    <div class="tabs" id="league-tabs"></div>

    <!-- Mode Tabs -->
    <div class="mode-tabs">
        <button class="mode-btn active" data-mode="games" onclick="switchMode('games')">Fixtures</button>
        <button class="mode-btn" data-mode="standings" onclick="switchMode('standings')">Table</button>
    </div>

    <!-- Games Widget -->
    <div id="games-section" class="widget-section">
        <api-sports-widget data-type="games"></api-sports-widget>
    </div>

    <!-- Standings Widget -->
    <div id="standings-section" class="widget-section hidden">
        <api-sports-widget data-type="standings" data-league="39" data-season="2024"></api-sports-widget>
    </div>

    <!-- Game detail (target container for when user clicks a match) -->
    <div id="game-content">
    </div>

    <!-- Standings detail (target container) -->
    <div id="standings-content">
    </div>

    <!-- Config widget — placed just before </body> as per tutorial -->
    <api-sports-widget data-type="config" data-sport="football" data-key="PLACEHOLDER_KEY" data-lang="en"
        data-theme="grey" data-show-errors="true" data-show-logos="true" data-refresh="60" data-favorite="true"
        data-standings="true" data-tab="games" data-game-tab="statistics" data-target-player="modal"
        data-target-game="modal" data-target-team="modal" data-target-standings="modal"
        data-color="#16A34A"></api-sports-widget>

    <script>
        // Get API key from URL params
        const API_KEY = new URLSearchParams(window.location.search).get('key') || '';

        // Set the API key on the config widget
        const configWidget = document.querySelector('[data-type="config"]');
        if (configWidget && API_KEY) {
            configWidget.setAttribute('data-key', API_KEY);
        }

        const LEAGUES = [
            { code: '39', name: 'Premier League' },
            { code: '2', name: 'Champions League' },
            { code: '140', name: 'La Liga' },
            { code: '78', name: 'Bundesliga' },
            { code: '135', name: 'Serie A' },
        ];

        let currentLeague = '39';
        let currentMode = 'games';

        // Build league tabs
        const tabsContainer = document.getElementById('league-tabs');
        LEAGUES.forEach(league => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (league.code === currentLeague ? ' active' : '');
            btn.textContent = league.name;
            btn.onclick = () => switchLeague(league.code);
            btn.dataset.league = league.code;
            tabsContainer.appendChild(btn);
        });

        function switchLeague(code) {
            currentLeague = code;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.league === code);
            });

            // Update the standings widget league
            const standingsWidget = document.querySelector('#standings-section api-sports-widget');
            if (standingsWidget) {
                standingsWidget.setAttribute('data-league', code);
                standingsWidget.setAttribute('data-season', '2024');
            }

            // Update the games widget league
            const gamesWidget = document.querySelector('#games-section api-sports-widget');
            if (gamesWidget) {
                gamesWidget.setAttribute('data-league', code);
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });

            document.getElementById('games-section').classList.toggle('hidden', mode !== 'games');
            document.getElementById('standings-section').classList.toggle('hidden', mode !== 'standings');
        }
    </script>
</body>

</html>
